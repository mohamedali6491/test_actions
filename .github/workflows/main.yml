name: Go Hello World

on: [push] # This tells GitHub when to run the script (e.g., every time you push code)

jobs:
  run-hello-world: # This is the ID of your job
    runs-on: ubuntu-latest # This specifies the virtual machine type
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.14.0'

      - name: Run Go script
        run: go run hello.go
